<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Admin Panel – Add Case Study</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <link rel="icon" type="image/png" href="images/favicon-16x16.png" sizes="16x16">
  <link rel="shortcut icon" href="images/favicon-16x16.png" type="image/png">
  <link href="https://cdn.jsdelivr.net/npm/quill@1.3.7/dist/quill.snow.css" rel="stylesheet">

  <style>
    body {
      font-family: 'Helvetica', 'Arial', sans-serif;
      padding: 40px;
      background-color: #f5f5f5;
      margin: 0;
    }

    h1 {
      text-align: center;
      margin-bottom: 30px;
      color: #1f1f1f;
    }

    .panel {
      max-width: 900px;
      margin: auto;
      background: white;
      padding: 32px;
      border-radius: 14px;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.12);
    }

    label {
      font-weight: 700;
      display: block;
      margin-top: 22px;
      margin-bottom: 8px;
      color: #1f1f1f;
    }

    input {
      font-family: 'Helvetica', 'Arial', sans-serif;
      width: 100%;
      padding: 12px 14px;
      margin-top: 5px;
      border-radius: 8px;
      border: 1px solid #cfcfcf;
      box-sizing: border-box;
      font-size: 15px;
    }

    input:focus {
      outline: none;
      border-color: #007acc;
      box-shadow: 0 0 0 3px rgba(0, 122, 204, 0.12);
    }

    .editor-wrapper {
      margin-top: 5px;
      border: 1px solid #cfcfcf;
      border-radius: 10px;
      overflow: hidden;
      background: #fff;
    }

    .ql-toolbar.ql-snow {
      border: none;
      border-bottom: 1px solid #e3e3e3;
      background: #fafafa;
    }

    .ql-container.ql-snow {
      border: none;
      font-family: 'Helvetica', 'Arial', sans-serif;
      font-size: 15px;
    }

    .editor {
      min-height: 180px;
    }

    .ql-editor {
      min-height: 180px;
      line-height: 1.7;
      color: #1f1f1f;
    }

    .ql-editor.ql-blank::before {
      color: #9a9a9a;
      font-style: normal;
    }

    button {
      font-family: 'Helvetica', 'Arial', sans-serif;
      margin-top: 20px;
      background-color: #007acc;
      color: white;
      padding: 13px 22px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-size: 1em;
      font-weight: 600;
    }

    button:hover {
      background-color: #005ea3;
    }

    button:disabled {
      background-color: #8cbfe3;
      cursor: not-allowed;
    }

    .secondary-btn {
      background-color: #444;
      margin-left: 10px;
    }

    .secondary-btn:hover {
      background-color: #2f2f2f;
    }

    .hidden {
      display: none;
    }

    .status-text {
      margin-top: 12px;
      font-size: 14px;
      color: #444;
    }

    .error-text {
      color: #b00020;
      margin-top: 12px;
      font-size: 14px;
    }

    .top-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      margin-bottom: 10px;
      flex-wrap: wrap;
    }

    @media (max-width: 768px) {
      body {
        padding: 20px;
      }

      .panel {
        padding: 20px;
      }

      .editor,
      .ql-editor {
        min-height: 150px;
      }
    }
  </style>
</head>
<body>
  <h1>Admin – Add Case Study</h1>

  <div class="panel" id="loginPanel">
    <h2 style="margin-top: 0; color: #1f1f1f;">Admin Login</h2>

    <label for="loginEmail">Email</label>
    <input type="email" id="loginEmail" placeholder="Enter admin email" />

    <label for="loginPassword">Password</label>
    <input type="password" id="loginPassword" placeholder="Enter password" />

    <button id="loginBtn" type="button">Sign In</button>
    <div id="loginError" class="error-text"></div>
  </div>

  <div class="panel hidden" id="adminPanel">
    <div class="top-bar">
      <div>
        <strong style="color:#1f1f1f;">Signed in as:</strong>
        <span id="signedInUser" style="color:#1f1f1f;"></span>
      </div>
      <button id="logoutBtn" type="button" class="secondary-btn">Sign Out</button>
    </div>

    <form id="caseForm">
      <label for="title">Title</label>
      <input type="text" id="title" required />

      <label for="situationEditor">Situation</label>
      <div class="editor-wrapper">
        <div id="toolbar-situation">
          <span class="ql-formats">
            <select class="ql-header">
              <option selected></option>
              <option value="1"></option>
              <option value="2"></option>
            </select>
            <select class="ql-align"></select>
          </span>
          <span class="ql-formats">
            <button type="button" class="ql-bold"></button>
            <button type="button" class="ql-italic"></button>
            <button type="button" class="ql-underline"></button>
          </span>
          <span class="ql-formats">
            <button type="button" class="ql-list" value="ordered"></button>
            <button type="button" class="ql-list" value="bullet"></button>
            <button type="button" class="ql-blockquote"></button>
          </span>
          <span class="ql-formats">
            <button type="button" class="ql-link"></button>
            <button type="button" class="ql-clean"></button>
          </span>
        </div>
        <div id="situationEditor" class="editor"></div>
      </div>

      <label for="taskEditor">Task</label>
      <div class="editor-wrapper">
        <div id="toolbar-task">
          <span class="ql-formats">
            <select class="ql-header">
              <option selected></option>
              <option value="1"></option>
              <option value="2"></option>
            </select>
            <select class="ql-align"></select>
          </span>
          <span class="ql-formats">
            <button type="button" class="ql-bold"></button>
            <button type="button" class="ql-italic"></button>
            <button type="button" class="ql-underline"></button>
          </span>
          <span class="ql-formats">
            <button type="button" class="ql-list" value="ordered"></button>
            <button type="button" class="ql-list" value="bullet"></button>
            <button type="button" class="ql-blockquote"></button>
          </span>
          <span class="ql-formats">
            <button type="button" class="ql-link"></button>
            <button type="button" class="ql-clean"></button>
          </span>
        </div>
        <div id="taskEditor" class="editor"></div>
      </div>

      <label for="actionEditor">Action</label>
      <div class="editor-wrapper">
        <div id="toolbar-action">
          <span class="ql-formats">
            <select class="ql-header">
              <option selected></option>
              <option value="1"></option>
              <option value="2"></option>
            </select>
            <select class="ql-align"></select>
          </span>
          <span class="ql-formats">
            <button type="button" class="ql-bold"></button>
            <button type="button" class="ql-italic"></button>
            <button type="button" class="ql-underline"></button>
          </span>
          <span class="ql-formats">
            <button type="button" class="ql-list" value="ordered"></button>
            <button type="button" class="ql-list" value="bullet"></button>
            <button type="button" class="ql-blockquote"></button>
          </span>
          <span class="ql-formats">
            <button type="button" class="ql-link"></button>
            <button type="button" class="ql-clean"></button>
          </span>
        </div>
        <div id="actionEditor" class="editor"></div>
      </div>

      <label for="howEditor">How</label>
      <div class="editor-wrapper">
        <div id="toolbar-how">
          <span class="ql-formats">
            <select class="ql-header">
              <option selected></option>
              <option value="1"></option>
              <option value="2"></option>
            </select>
            <select class="ql-align"></select>
          </span>
          <span class="ql-formats">
            <button type="button" class="ql-bold"></button>
            <button type="button" class="ql-italic"></button>
            <button type="button" class="ql-underline"></button>
          </span>
          <span class="ql-formats">
            <button type="button" class="ql-list" value="ordered"></button>
            <button type="button" class="ql-list" value="bullet"></button>
            <button type="button" class="ql-blockquote"></button>
          </span>
          <span class="ql-formats">
            <button type="button" class="ql-link"></button>
            <button type="button" class="ql-clean"></button>
          </span>
        </div>
        <div id="howEditor" class="editor"></div>
      </div>

      <label for="resultEditor">Result</label>
      <div class="editor-wrapper">
        <div id="toolbar-result">
          <span class="ql-formats">
            <select class="ql-header">
              <option selected></option>
              <option value="1"></option>
              <option value="2"></option>
            </select>
            <select class="ql-align"></select>
          </span>
          <span class="ql-formats">
            <button type="button" class="ql-bold"></button>
            <button type="button" class="ql-italic"></button>
            <button type="button" class="ql-underline"></button>
          </span>
          <span class="ql-formats">
            <button type="button" class="ql-list" value="ordered"></button>
            <button type="button" class="ql-list" value="bullet"></button>
            <button type="button" class="ql-blockquote"></button>
          </span>
          <span class="ql-formats">
            <button type="button" class="ql-link"></button>
            <button type="button" class="ql-clean"></button>
          </span>
        </div>
        <div id="resultEditor" class="editor"></div>
      </div>

      <button type="submit" id="submitBtn">Submit Case Study</button>
      <div id="submitStatus" class="status-text"></div>
    </form>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/quill@1.3.7/dist/quill.min.js"></script>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.10.0/firebase-app.js";
    import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/11.10.0/firebase-firestore.js";
    import {
      getAuth,
      signInWithEmailAndPassword,
      signOut,
      onAuthStateChanged
    } from "https://www.gstatic.com/firebasejs/11.10.0/firebase-auth.js";

    const firebaseConfig = {
      apiKey: "AIzaSyALUiNuAEVlKjXQuq-qF_CtdY8jNzeGTJs",
      authDomain: "agasthya-case-studies.firebaseapp.com",
      projectId: "agasthya-case-studies",
      storageBucket: "agasthya-case-studies.appspot.com",
      messagingSenderId: "297538227832",
      appId: "1:297538227832:web:625891c11d377c9d88278d"
    };

    const ADMIN_EMAIL = "agasthyarocker@gmail.com";

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const auth = getAuth(app);

    const loginPanel = document.getElementById("loginPanel");
    const adminPanel = document.getElementById("adminPanel");
    const loginBtn = document.getElementById("loginBtn");
    const logoutBtn = document.getElementById("logoutBtn");
    const loginError = document.getElementById("loginError");
    const signedInUser = document.getElementById("signedInUser");
    const submitBtn = document.getElementById("submitBtn");
    const submitStatus = document.getElementById("submitStatus");
    const form = document.getElementById("caseForm");
    const titleInput = document.getElementById("title");

    function createEditor(editorId, toolbarId, placeholderText) {
      return new Quill(`#${editorId}`, {
        theme: "snow",
        modules: {
          toolbar: `#${toolbarId}`
        },
        placeholder: placeholderText
      });
    }

    function getEditorHtml(editor) {
      const html = editor.root.innerHTML.trim();
      return html === "<p><br></p>" ? "" : html;
    }

    function clearEditor(editor) {
      editor.setContents([]);
    }

    const situationEditor = createEditor("situationEditor", "toolbar-situation", "Write the situation...");
    const taskEditor = createEditor("taskEditor", "toolbar-task", "Write the task...");
    const actionEditor = createEditor("actionEditor", "toolbar-action", "Write the action...");
    const howEditor = createEditor("howEditor", "toolbar-how", "Write the implementation details...");
    const resultEditor = createEditor("resultEditor", "toolbar-result", "Write the result...");

    function setAdminView(user) {
      if (user && user.email === ADMIN_EMAIL) {
        loginPanel.classList.add("hidden");
        adminPanel.classList.remove("hidden");
        signedInUser.textContent = user.email;
      } else {
        adminPanel.classList.add("hidden");
        loginPanel.classList.remove("hidden");
        signedInUser.textContent = "";
      }
    }

    onAuthStateChanged(auth, (user) => {
      setAdminView(user);
    });

    loginBtn.addEventListener("click", async () => {
      const email = document.getElementById("loginEmail").value.trim();
      const password = document.getElementById("loginPassword").value;
      loginError.textContent = "";

      if (!email || !password) {
        loginError.textContent = "Enter email and password.";
        return;
      }

      try {
        const result = await signInWithEmailAndPassword(auth, email, password);
        if (result.user.email !== ADMIN_EMAIL) {
          await signOut(auth);
          loginError.textContent = "Access denied.";
        }
      } catch (err) {
        loginError.textContent = "Login failed: " + err.message;
      }
    });

    logoutBtn.addEventListener("click", async () => {
      await signOut(auth);
    });

    form.addEventListener("submit", async (e) => {
      e.preventDefault();
      submitStatus.textContent = "";

      const user = auth.currentUser;
      if (!user || user.email !== ADMIN_EMAIL) {
        alert("Please sign in first.");
        return;
      }

      const title = titleInput.value.trim();
      const situation = getEditorHtml(situationEditor);
      const task = getEditorHtml(taskEditor);
      const action = getEditorHtml(actionEditor);
      const how = getEditorHtml(howEditor);
      const result = getEditorHtml(resultEditor);

      if (!title || !situation || !task || !action || !how || !result) {
        alert("All fields are required.");
        return;
      }

      submitBtn.disabled = true;
      submitBtn.textContent = "Submitting...";

      try {
        await addDoc(collection(db, "caseStudies"), {
          Title: title,
          Situation: situation,
          Task: task,
          Action: action,
          How: how,
          Result: result,
          timestamp: new Date()
        });

        submitStatus.textContent = "✅ Case study submitted successfully!";
        form.reset();
        clearEditor(situationEditor);
        clearEditor(taskEditor);
        clearEditor(actionEditor);
        clearEditor(howEditor);
        clearEditor(resultEditor);
        titleInput.focus();
      } catch (error) {
        console.error("❌ Error adding document:", error);
        submitStatus.textContent = "Failed to submit case study. Please try again.";
      } finally {
        submitBtn.disabled = false;
        submitBtn.textContent = "Submit Case Study";
      }
    });
  </script>
</body>
</html>
